<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="theme-color" content="#ffffff">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="cdgdg_github_io">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.ico"/>

  <title>cdgdg_github_io</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      color-scheme: light;
      --loader-bg: #ffffff;
      --loader-accent: #d1d5db;
      --loader-text-main: #111827;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--loader-bg);
    }

    body {
      overflow: hidden;
    }

    #initial-loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--loader-bg);
      transition: opacity 240ms ease, visibility 240ms ease;
    }

    #initial-loading-overlay.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-shell {
      width: min(220px, 100%);
      padding: 24px;
      text-align: center;
      font-family: "Noto Sans KR", sans-serif;
    }

    .loader-mark {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      display: block;
      object-fit: contain;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .loader-title {
      margin: 0;
      color: var(--loader-text-main);
      font-size: 16px;
      font-weight: 500;
    }

    .loader-bar {
      height: 4px;
      margin-top: 16px;
      overflow: hidden;
      border-radius: 999px;
      background: #f3f4f6;
    }

    .loader-bar::after {
      content: "";
      display: block;
      width: 40%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ffffff, var(--loader-accent), #ffffff);
      animation: progress 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.04); opacity: 0.82; }
    }

    @keyframes progress {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(310%); }
    }
  </style>
  <script>
    window.hideInitialLoadingOverlay = function () {
      const overlay = document.getElementById('initial-loading-overlay');
      if (!overlay) {
        return;
      }

      overlay.classList.add('is-hidden');
      window.setTimeout(() => overlay.remove(), 350);
    };
  </script>
</head>
<body>
  <div id="initial-loading-overlay" aria-live="polite" aria-busy="true">
    <div class="loader-shell">
      <img class="loader-mark" src="assets/images/logo.png" alt="Loading logo">
      <h1 class="loader-title">로딩 중...</h1>
      <div class="loader-bar"></div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
